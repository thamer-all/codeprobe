name: 'codeprobe'
description: 'DevTools for AI Coding — context analysis, prompt testing, and quality checks'
author: 'thamer-all'
branding:
  icon: 'search'
  color: 'blue'

inputs:
  command:
    description: 'Command to run: check, scan, test, lint, security, context, quality'
    required: false
    default: 'check'
  path:
    description: 'Path to analyze'
    required: false
    default: '.'
  post-comment:
    description: 'Post results as PR comment (true/false)'
    required: false
    default: 'true'
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '20'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install codeprobe
      shell: bash
      run: npm install -g codeprobe

    - name: Run codeprobe
      id: codeprobe
      shell: bash
      run: |
        set +e
        OUTPUT=$(codeprobe ${{ inputs.command }} ${{ inputs.path }} --json 2>&1)
        EXIT_CODE=$?
        echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

        # Save output for comment
        EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
        echo "output<<$EOF" >> $GITHUB_OUTPUT
        echo "$OUTPUT" >> $GITHUB_OUTPUT
        echo "$EOF" >> $GITHUB_OUTPUT

        # Also run human-readable version for logs
        echo "--- codeprobe ${{ inputs.command }} ---"
        codeprobe ${{ inputs.command }} ${{ inputs.path }} 2>&1 || true

    - name: Post PR Comment
      if: inputs.post-comment == 'true' && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const output = `${{ steps.codeprobe.outputs.output }}`;
          const exitCode = '${{ steps.codeprobe.outputs.exit_code }}';
          const command = '${{ inputs.command }}';
          const status = exitCode === '0' ? '✅' : '❌';

          const body = `## ${status} codeprobe ${command}\n\n\`\`\`json\n${output.slice(0, 60000)}\n\`\`\`\n\n<sub>Posted by [codeprobe](https://github.com/thamer-all/codeprobe)</sub>`;

          // Find existing codeprobe comment
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const existing = comments.find(c => c.body && c.body.includes('Posted by [codeprobe]'));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

    - name: Set exit code
      if: steps.codeprobe.outputs.exit_code != '0'
      shell: bash
      run: exit 1
